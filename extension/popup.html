<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfferScope Collector</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">OfferScope Collector</p>
      <h1>采集当前帖子</h1>
      <p class="hint">在小红书帖子详情页打开插件，点击采集后复制或下载 JSON。</p>

      <div class="actions">
        <button id="collectBtn">采集当前页面</button>
        <button id="copyBtn" class="ghost">复制 JSON</button>
        <button id="downloadBtn" class="ghost">下载 JSON</button>
      </div>

      <div id="status" class="status">等待采集</div>
      <textarea id="output" spellcheck="false" placeholder="这里会显示采集结果"></textarea>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
